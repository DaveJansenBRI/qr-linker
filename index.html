<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset QR Linker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        .asset-id {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        .asset-number {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 24px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            color: white;
            margin-bottom: 12px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-dalux {
            background: linear-gradient(135deg, #2c3e50, #34495e);
        }
        .btn-brigit {
            background: linear-gradient(135deg, #d4a017, #c6930a);
        }
        .error {
            color: #e74c3c;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <p class="asset-id">Asset</p>
        <p class="asset-number" id="asset-number">...</p>
        <a class="btn btn-dalux" id="btn-dalux">&#x1F4D0; Open in Dalux</a>
        <a class="btn btn-brigit" id="btn-brigit">&#x1F527; Open in Brigit</a>
    </div>

    <script>
        // Asset lookup table (per project, later from assets.json)
        const assets = {
            "5794129": {
                dalux: "LandingPage%7C%3F303048207527575552%7C%3F3%7C%3F646911%7C%3F%2BVthpnVQsy6FOKR0ZDdafA%7C%3FVE_Vavbox_Circular%201%20Outlet%20No%20Plenum_MEPcontent_Trox%20Air_TVR%20Compact%3A%20TVR%20Compact_TVR%20Compact_315"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (id && assets[id]) {
            document.getElementById('asset-number').textContent = id;
            document.getElementById('btn-dalux').href = 
                'https://node2.field.dalux.com/service/qr/content?qrString=' + assets[id].dalux;
            document.getElementById('btn-brigit').href = 
                'https://bri.brigit.online/qrcode/scan/' + id;
        } else if (id) {
            document.getElementById('asset-number').textContent = id;
            document.getElementById('card').innerHTML = 
                '<p class="error">Asset ' + id + ' niet gevonden in dit project.</p>';
        } else {
            document.getElementById('card').innerHTML = 
                '<p class="error">Geen asset ID opgegeven.</p>';
        }
    </script>
</body>
</html>
