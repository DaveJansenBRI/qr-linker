<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test QR - Asset 5794129</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        h1 { font-size: 20px; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 16px; font-size: 14px; }
        #qr { margin: 20px auto; }
        .url { font-family: monospace; font-size: 12px; color: #999; word-break: break-all; max-width: 300px; margin-top: 12px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>&#x1F4F1; Test QR-code</h1>
        <p>Scan deze QR met je telefoon om te testen</p>
        <canvas id="qr"></canvas>
        <p class="url" id="url"></p>
    </div>

    <script>
        const url = 'https://davejansenbri.github.io/qr-linker/?id=5794129';
        document.getElementById('url').textContent = url;
        QRCode.toCanvas(document.getElementById('qr'), url, {
            width: 256,
            margin: 2,
            color: { dark: '#000000', light: '#ffffff' }
        });
    </script>
</body>
</html>
