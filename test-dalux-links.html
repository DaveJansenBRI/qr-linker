<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dalux Links - GUID Conversie</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { font-size: 22px; margin-bottom: 4px; }
        .subtitle { color: #666; margin-bottom: 24px; }
        .element {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .element-title { font-weight: 600; font-size: 15px; margin-bottom: 8px; }
        .links { display: flex; gap: 12px; flex-wrap: wrap; }
        .links a {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }
        .link-a { background: #e3f2fd; color: #1565c0; }
        .link-b { background: #fce4ec; color: #c62828; }
        .link-a:hover { background: #bbdefb; }
        .link-b:hover { background: #f8bbd0; }
        .meta {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
            font-family: monospace;
            word-break: break-all;
        }
        .info {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .badge {
            display: inline-block;
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <h1>🧪 Test Dalux Links — GUID Conversie</h1>
    <p class="subtitle">IFC GUID → Dalux Base64. Test welke methode werkt.</p>

    <div class="info">
        <strong>Twee methodes:</strong><br>
        🔵 <strong>Methode A</strong> = Direct (big-endian, zelfde volgorde als IFC)<br>
        🔴 <strong>Methode B</strong> = .NET byte-swap (Data1/2/3 reversed)<br><br>
        Klik op beide voor element #1 en laat weten welke werkt!
    </div>

    <div id="elements"></div>

    <script>
        // ═══════════════════════════════════════════
        // IFC GUID → Dalux Base64 Converter
        // ═══════════════════════════════════════════

        var IFC_CHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz_$';

        function ifcGuidToBytes(ifcGuid) {
            var n = 0n;
            for (var i = 0; i < 22; i++) {
                n = n * 64n + BigInt(IFC_CHARS.indexOf(ifcGuid[i]));
            }
            var bytes = new Uint8Array(16);
            for (var i = 15; i >= 0; i--) {
                bytes[i] = Number(n & 0xFFn);
                n >>= 8n;
            }
            return bytes;
        }

        function bytesToBase64(bytes) {
            var binary = '';
            for (var i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary).replace(/=+$/, '');
        }

        // Method A: Direct big-endian (same byte order as IFC)
        function convertMethodA(ifcGuid) {
            return bytesToBase64(ifcGuidToBytes(ifcGuid));
        }

        // Method B: .NET GUID byte swap
        function convertMethodB(ifcGuid) {
            var bytes = ifcGuidToBytes(ifcGuid);
            var swapped = new Uint8Array(16);
            // Data1 (4 bytes) reversed
            swapped[0] = bytes[3]; swapped[1] = bytes[2];
            swapped[2] = bytes[1]; swapped[3] = bytes[0];
            // Data2 (2 bytes) reversed
            swapped[4] = bytes[5]; swapped[5] = bytes[4];
            // Data3 (2 bytes) reversed
            swapped[6] = bytes[7]; swapped[7] = bytes[6];
            // Data4 (8 bytes) as-is
            for (var i = 8; i < 16; i++) swapped[i] = bytes[i];
            return bytesToBase64(swapped);
        }

        function buildDaluxUrl(daluxGuid, objectType) {
            // Add space after colon if missing (IFC has "Type:Name", Dalux wants "Type: Name")
            var fixedType = objectType.replace(/:([^ ])/g, ': $1');
            var qrString = 'LandingPage|?' + '303048207527575552' + '|?3|?646911|?' + daluxGuid + '|?' + fixedType;
            return 'https://node2.field.dalux.com/service/qr/content?qrString=' + encodeURIComponent(qrString);
        }

        // ═══════════════════════════════════════════
        // Element data (from IFC export)
        // ═══════════════════════════════════════════

        var elements = [
            { guid: '3SMIK9E5vAEOs8AMi6xUq8', type: 'VE_Vavbox_Circular 1 Outlet No Plenum_MEPcontent_Trox Air_TVR Compact:TVR Compact_TVR Compact_315', label: 'TVR Compact Ø315' },
            { guid: '3SMIK9E5vAEOs8AMi6xUqQ', type: 'VE_Vavbox_Circular 1 Outlet No Plenum_MEPcontent_Trox Air_TVR Compact:TVR Compact_TVR Compact_250', label: 'TVR Compact Ø250' },
            { guid: '3YD18rtH9AqOjieOIQZNNy', type: 'SA_Cistern_MEPcontent_Geberit_Duofix UP320_INT-EN:Duofix UP320', label: 'Geberit Duofix UP320' },
            { guid: '3YD18rtH9AqOjieOIQZNBb', type: 'NLRS_74_PF_FB_AV_Geberit wandtoiletpot S8P00090000G_BCB:NLRS_74_PF_FB_AV_Geberit wandtoiletpot S8P00090000G_BCB', label: 'Geberit wandtoiletpot' },
            { guid: '3YD18rtH9AqOjieOIQZNFQ', type: 'SA_Cistern_MEPcontent_Geberit_Duofix UP320_INT-EN:Duofix UP320', label: 'Geberit Duofix UP320' },
            { guid: '3YD18rtH9AqOjieOIQZNFP', type: 'NLRS_74_PF_FB_AV_Geberit wandtoiletpot S8P00090000G_BCB:NLRS_74_PF_FB_AV_Geberit wandtoiletpot S8P00090000G_BCB', label: 'Geberit wandtoiletpot' },
            { guid: '3YD18rtH9AqOjieOIQZKSa', type: 'NLRS_74_PF_UN_AV_Geberit wastafel 500 229 01 1_BCB:NLRS_74_PF_UN_AV_Geberit wastafel 500 229 01 1_BCB', label: 'Geberit wastafel 500' },
            { guid: '3YD18rtH9AqOjieOIQZK01', type: 'NLRS_74_PF_UN_AV_Geberit wastafel 500 229 01 1_BCB:NLRS_74_PF_UN_AV_Geberit wastafel 500 229 01 1_BCB', label: 'Geberit wastafel 500' },
            { guid: '3YD18rtH9AqOjieOIQZK8O', type: 'NLRS_74_PF_UN_AV_Geberit wastafel 500 229 01 1_BCB:NLRS_74_PF_UN_AV_Geberit wastafel 500 229 01 1_BCB', label: 'Geberit wastafel 500' },
            { guid: '3YD18rtH9AqOjieOIQZKoY', type: 'NLRS_74_PF_FB_AV_Geberit wandtoiletpot S8P00090000G_BCB:NLRS_74_PF_FB_AV_Geberit wandtoiletpot S8P00090000G_BCB', label: 'Geberit wandtoiletpot' }
        ];

        // ═══════════════════════════════════════════
        // Render
        // ═══════════════════════════════════════════

        var container = document.getElementById('elements');

        elements.forEach(function(el, idx) {
            var guidA = convertMethodA(el.guid);
            var guidB = convertMethodB(el.guid);
            var urlA = buildDaluxUrl(guidA, el.type);
            var urlB = buildDaluxUrl(guidB, el.type);

            var div = document.createElement('div');
            div.className = 'element';
            div.innerHTML =
                '<div class="element-title"><span class="badge">#' + (idx + 1) + '</span>' + el.label + '</div>' +
                '<div class="links">' +
                '  <a class="link-a" href="' + urlA + '" target="_blank">🔵 Methode A</a>' +
                '  <a class="link-b" href="' + urlB + '" target="_blank">🔴 Methode B</a>' +
                '</div>' +
                '<div class="meta">IFC: ' + el.guid + ' → A: ' + guidA + ' | B: ' + guidB + '</div>';
            container.appendChild(div);
        });
    </script>
</body>
</html>
